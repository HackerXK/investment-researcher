services:
  prefect-postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${PREFECT_PG_USER:-prefect}
      - POSTGRES_PASSWORD=${PREFECT_PG_PASSWORD:-prefect}
      - POSTGRES_DB=${PREFECT_PG_DB:-prefect}
    volumes:
      - prefect-pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PREFECT_PG_USER:-prefect}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  prefect-server:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    depends_on:
      prefect-postgres:
        condition: service_healthy
    environment:
      - PREFECT_SERVER_DATABASE_CONNECTION_URL=postgresql+asyncpg://${PREFECT_PG_USER:-prefect}:${PREFECT_PG_PASSWORD:-prefect}@prefect-postgres:5432/${PREFECT_PG_DB:-prefect}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  ir-service:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      - EDGAR_IDENTITY=${EDGAR_IDENTITY}
      - EDGAR_LOCAL_DATA_DIR_RUNTIME=${EDGAR_LOCAL_DATA_DIR_RUNTIME}
      - DUCKDB_PATH_RUNTIME=${DUCKDB_PATH_RUNTIME}
      - STATE_DB_PATH_RUNTIME=${STATE_DB_PATH_RUNTIME}
      - PREFECT_API_URL=http://prefect-server:4200/api
      - EDGAR_FILINGS_START_DATE=${EDGAR_FILINGS_START_DATE}
      - EDGAR_RAW_FILING_TICKERS=${EDGAR_RAW_FILING_TICKERS}
      - FORCE_SEED=${FORCE_SEED:-false}
    volumes:
      - type: bind
        source: ${EDGAR_LOCAL_DATA_DIR_HOST_SOURCE}
        target: ${EDGAR_LOCAL_DATA_DIR_RUNTIME}
      - type: bind
        source: ${DUCKDB_DIR_HOST_SOURCE}
        target: ${DUCKDB_DIR_RUNTIME}
      - type: bind
        source: ${STATE_DIR_HOST_SOURCE}
        target: ${STATE_DIR_RUNTIME}
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "uvicorn", "investment_researcher.web.app:app", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "8080:8080"
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      - EDGAR_IDENTITY=${EDGAR_IDENTITY}
      - EDGAR_LOCAL_DATA_DIR_RUNTIME=${EDGAR_LOCAL_DATA_DIR_RUNTIME}
      - DUCKDB_PATH_RUNTIME=${DUCKDB_PATH_RUNTIME}
      - STATE_DB_PATH_RUNTIME=${STATE_DB_PATH_RUNTIME}
      - LLM_API_BASE=${LLM_API_BASE:-http://host.docker.internal:8000/v1}
      - LLM_MODEL=${LLM_MODEL:-Qwen/Qwen2.5-32B-Instruct}
      - LLM_API_KEY=${LLM_API_KEY:-EMPTY}
    volumes:
      - type: bind
        source: ${EDGAR_LOCAL_DATA_DIR_HOST_SOURCE}
        target: ${EDGAR_LOCAL_DATA_DIR_RUNTIME}
        read_only: true
      - type: bind
        source: ${DUCKDB_DIR_HOST_SOURCE}
        target: ${DUCKDB_DIR_RUNTIME}
        read_only: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/docs')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - NUXT_API_BASE=http://api:8080
      - NUXT_PUBLIC_API_BASE=http://api:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

volumes:
  prefect-pg-data:
